<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSmart 开发智慧平台 v1.0.3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --card: #151b25;
            --border: #252b35;
            --blue: #3b82f6;
            --text: #e2e8f0;
            --muted: #64748b;
            --radius: 10px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:system-ui, sans-serif; height:100vh; display:flex; }
        .sidebar {
            width:240px; background:#12171f; border-right:1px solid var(--border);
            display:flex; flex-direction:column; padding:12px;
        }
        .sidebar h3 { margin-bottom:16px; }
        .nav-item {
            padding:10px 12px; margin:2px 0; border-radius:6px; cursor:pointer;
            color:var(--muted); transition:0.2s; text-decoration:none; display:block;
        }
        .nav-item:hover, .nav-item.active { background:#1a1f2b; color:var(--text); }
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        .topbar {
            padding:10px 20px; background:#12171f; border-bottom:1px solid var(--border);
            display:flex; align-items:center; gap:12px;
        }
        .btn {
            background:var(--blue); border:none; color:#fff; padding:8px 16px;
            border-radius:6px; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; gap:6px;
        }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
        .card {
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
            padding:20px; margin:12px;
        }
        .page { display:none; }
        .page.active { display:block; }
        .config-panel {
            position:fixed; top:60px; right:20px; width:300px;
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
            padding:16px; z-index:999; box-shadow:0 10px 25px rgba(0,0,0,0.5);
        }
        .config-panel label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
        .config-panel input {
            width:100%; margin-bottom:12px; padding:8px; background:#0d1117;
            border:1px solid var(--border); border-radius:4px; color:var(--text);
        }
        .hidden { display:none !important; }
        .toast {
            position:fixed; top:20px; right:20px; background:var(--blue);
            color:#fff; padding:12px 20px; border-radius:8px; z-index:9999;
        }
        iframe { width:100%; height:315px; border-radius:8px; }
        @media (max-width:768px) {
            .sidebar { display:none; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>🧠 DevSmart</h3>
    <a class="nav-item active" data-page="dash">📊 仪表盘</a>
    <a class="nav-item" data-page="learn">🎓 学习中心</a>
    <a class="nav-item" data-page="work">💼 模拟上班</a>
    <a class="nav-item" data-page="exam">📝 AI 考试</a>
    <a class="nav-item" data-page="jobs">💼 兼职</a>
</div>

<div class="main">
    <div class="topbar">
        <button class="btn btn-outline" id="configBtn"><i class="fa-solid fa-key"></i> API 配置</button>
        <span style="margin-left:auto;">v1.0.3</span>
    </div>

    <div style="flex:1;overflow-y:auto;">

        <!-- 仪表盘 -->
        <div class="page active" id="page-dash">
            <div class="card">
                <h3>👋 欢迎回来</h3>
                <p>设置面板在右上角，点击按钮打开。视频内嵌在学习中心。</p>
            </div>
        </div>

        <!-- 学习中心 -->
        <div class="page" id="page-learn">
            <div class="card">
                <h3>📺 内嵌视频播放</h3>
                <p style="color:var(--muted);">无需 API Key，直接播放 YouTube 视频</p>
                <input type="text" id="videoIdInput" placeholder="输入 YouTube 视频 ID 或完整链接" style="width:100%;padding:10px;background:#0d1117;border:1px solid var(--border);border-radius:4px;color:var(--text);margin:10px 0;">
                <button class="btn" onclick="loadVideo()">▶ 加载视频</button>
                <div id="videoContainer" style="margin-top:16px;">
                    <iframe id="videoFrame" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
                </div>
                <p style="font-size:12px;color:var(--muted);margin-top:8px;">示例视频 ID：dQw4w9WgXcQ</p>
            </div>
        </div>

        <!-- 模拟上班 -->
        <div class="page" id="page-work">
            <div class="card">
                <h3>💼 模拟上班</h3>
                <input type="text" id="topicInput" placeholder="正在学什么？" style="width:100%;padding:10px;background:#0d1117;border:1px solid var(--border);border-radius:4px;color:var(--text);margin-bottom:12px;">
                <button class="btn" onclick="generateTasks()">🤖 AI 生成任务</button>
                <div id="taskResult" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- AI 考试 -->
        <div class="page" id="page-exam">
            <div class="card">
                <h3>📝 AI 出题</h3>
                <input type="text" id="examTopic" value="React 18" style="width:100%;padding:10px;background:#0d1117;border:1px solid var(--border);border-radius:4px;color:var(--text);margin-bottom:12px;">
                <button class="btn" onclick="genExam()">生成考题</button>
                <div id="examResult" style="margin-top:16px;"></div>
            </div>
        </div>

        <!-- 兼职 -->
        <div class="page" id="page-jobs">
            <div class="card">
                <h3>💼 兼职广场</h3>
                <button class="btn" onclick="fetchJobs()">获取岗位</button>
                <div id="jobResult" style="margin-top:12px;"></div>
            </div>
        </div>

    </div>
</div>

<!-- 配置面板（默认显示，方便你看到） -->
<div class="config-panel" id="configPanel">
    <h4>🔑 API 配置</h4>
    <label>GitHub Token</label>
    <input type="password" id="ghToken" placeholder="ghp_...">
    <label>YouTube Key (可选)</label>
    <input type="password" id="ytKey" placeholder="AIza...">
    <button class="btn" onclick="saveConfig()" style="width:100%;">💾 保存</button>
</div>

<div id="toastContainer"></div>

<script>
    // 确保配置面板默认可见，方便测试
    const panel = document.getElementById('configPanel');
    // 如果面板是hidden，移除hidden让它显示（首次加载时我们没加hidden类）
    let configVisible = true;
    document.getElementById('configBtn').addEventListener('click', () => {
        configVisible = !configVisible;
        if(configVisible) panel.classList.remove('hidden');
        else panel.classList.add('hidden');
    });

    // 页面切换
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + item.dataset.page).classList.add('active');
        });
    });

    // Toast
    function toast(msg, type='info') {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // 配置保存
    function saveConfig() {
        const config = {
            githubToken: document.getElementById('ghToken').value.trim(),
            youtubeKey: document.getElementById('ytKey').value.trim(),
        };
        localStorage.setItem('devsmart_config', JSON.stringify(config));
        toast('配置已保存 ✅');
    }
    // 加载配置
    (function loadConfig() {
        const saved = localStorage.getItem('devsmart_config');
        if(saved) {
            const c = JSON.parse(saved);
            document.getElementById('ghToken').value = c.githubToken || '';
            document.getElementById('ytKey').value = c.youtubeKey || '';
        }
    })();

    // 视频加载（内嵌 iframe，无需 API Key）
    function loadVideo() {
        let input = document.getElementById('videoIdInput').value.trim();
        let videoId = input;
        // 提取 YouTube ID
        const match = input.match(/(?:youtu\.be\/|watch\?v=|\/embed\/)([^&?/]+)/);
        if(match) videoId = match[1];
        document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${videoId}`;
        toast('视频已加载 🎬');
    }

    // AI 调用（需要 GitHub Token）
    async function callAI(messages) {
        const config = JSON.parse(localStorage.getItem('devsmart_config') || '{}');
        const token = config.githubToken;
        if(!token) { toast('请先保存 GitHub Token','error'); return null; }
        try {
            const res = await fetch('https://models.github.ai/inference/chat/completions', {
                method:'POST',
                headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ model:'gpt-4o', messages, max_tokens:500 })
            });
            const data = await res.json();
            return data.choices?.[0]?.message?.content || '无回复';
        } catch(e) { toast('AI 请求失败','error'); return null; }
    }

    // 生成任务
    async function generateTasks() {
        const topic = document.getElementById('topicInput').value.trim();
        if(!topic) return toast('请输入学习主题');
        document.getElementById('taskResult').innerHTML = '⏳ AI 思考中...';
        const reply = await callAI([{role:'user', content:`为学习"${topic}"的开发者安排4项工作任务，JSON数组格式输出。`}]);
        document.getElementById('taskResult').innerHTML = reply ? reply.replace(/\n/g,'<br>') : '生成失败';
    }

    // 生成考题
    async function genExam() {
        const topic = document.getElementById('examTopic').value.trim();
        document.getElementById('examResult').innerHTML = '⏳ 生成中...';
        const reply = await callAI([{role:'user', content:`生成关于"${topic}"的3道单选题，JSON数组：[{"question":"","options":["A","B","C","D"],"answer":0}]`}]);
        document.getElementById('examResult').innerHTML = reply ? `<pre>${reply}</pre>` : '失败';
    }

    // 兼职
    async function fetchJobs() {
        document.getElementById('jobResult').innerHTML = '⏳ 获取中...';
        try {
            const res = await fetch('https://remotejobs.org/api/v1/jobs?category=programming&limit=5');
            const data = await res.json();
            document.getElementById('jobResult').innerHTML = data.data?.map(j=>`<div>${j.title} @ ${j.company?.name}</div>`).join('') || '暂无数据';
        } catch(e) { document.getElementById('jobResult').innerHTML = '获取失败'; }
    }

    // 默认视频
    window.onload = () => {
        // 确保设置面板初始可见（没有hidden类）
        panel.classList.remove('hidden');
    };
</script>
</body>
</html>
