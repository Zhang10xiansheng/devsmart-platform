<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSmart 平台 v1.0.4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e14;
            --card: #151b25;
            --border: #252b35;
            --blue: #3b82f6;
            --text: #e2e8f0;
            --muted: #64748b;
            --radius: 10px;
            --green: #10b981;
            --orange: #f59e0b;
            --purple: #8b5cf6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; }
        .hidden { display: none !important; }

        /* 侧边栏 */
        .sidebar {
            width: 240px; background: #12171f; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 16px; flex-shrink: 0;
        }
        .sidebar h2 { font-size: 18px; margin-bottom: 16px; }
        .nav-item {
            padding: 10px 12px; margin: 3px 0; border-radius: 6px; cursor: pointer;
            color: var(--muted); transition: 0.2s; text-decoration: none; display: block;
        }
        .nav-item i { width: 20px; }
        .nav-item:hover, .nav-item.active { background: #1a1f2b; color: var(--text); }

        /* 主区域 */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar {
            padding: 10px 20px; background: #12171f; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 12px;
        }
        .btn {
            background: var(--blue); border: none; color: #fff; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px; margin: 12px;
        }
        .page { display: none; }
        .page.active { display: block; }
        .content-scroll { flex: 1; overflow-y: auto; padding: 8px; }

        /* 配置面板 */
        .config-panel {
            position: fixed; top: 70px; right: 20px; width: 300px;
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .config-panel label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
        .config-panel input {
            width: 100%; margin-bottom: 12px; padding: 8px; background: #0d1117;
            border: 1px solid var(--border); border-radius: 4px; color: var(--text);
        }
        .config-panel .note { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
        .toast {
            position: fixed; top: 20px; right: 20px; background: var(--blue);
            color: #fff; padding: 12px 20px; border-radius: 8px; z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-error { background: #ef4444; }
        .toast-success { background: var(--green); }

        iframe { width: 100%; height: 360px; border: none; border-radius: 8px; }
        textarea.code-area {
            width: 100%; min-height: 200px; background: #0d1117; color: #e2e8f0;
            border: 1px solid var(--border); border-radius: 6px; padding: 12px;
            font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; resize: vertical;
        }
        .output-box {
            background: #0d1117; border-radius: 6px; padding: 12px; margin-top: 12px;
            font-family: monospace; font-size: 13px; white-space: pre-wrap; max-height: 200px; overflow-y: auto;
        }
        .chat-msg { margin: 4px 0; padding: 8px 12px; border-radius: 8px; max-width: 80%; }
        .chat-msg.user { background: var(--blue); color: #fff; align-self: flex-end; }
        .chat-msg.ai { background: #1a1f2b; align-self: flex-start; }
        .flex-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
    <h2>🧠 DevSmart</h2>
    <a class="nav-item active" data-page="dash"><i class="fa-solid fa-gauge-high"></i> 仪表盘</a>
    <a class="nav-item" data-page="learn"><i class="fa-solid fa-play"></i> 学习中心</a>
    <a class="nav-item" data-page="work"><i class="fa-solid fa-briefcase"></i> 模拟上班</a>
    <a class="nav-item" data-page="exam"><i class="fa-solid fa-file-pen"></i> AI 考试</a>
    <a class="nav-item" data-page="jobs"><i class="fa-solid fa-hand-holding-dollar"></i> 兼职广场</a>
</div>

<!-- 主区域 -->
<div class="main">
    <div class="topbar">
        <button class="btn btn-outline btn-sm" id="toggleConfig"><i class="fa-solid fa-key"></i> 配置</button>
        <span style="margin-left: auto; font-size: 13px; color: var(--muted);">v1.0.4</span>
    </div>

    <div class="content-scroll" id="contentScroll">
        <!-- 仪表盘 -->
        <div class="page active" id="page-dash">
            <div class="card">
                <h3>👋 欢迎使用 DevSmart</h3>
                <p style="color: var(--muted);">AI 助手（基于 GitHub Models）</p>
                <div id="chatBox" style="max-height: 300px; overflow-y: auto; margin: 12px 0;">
                    <div class="chat-msg ai">你好！我是 DevSmart AI。有什么可以帮你的？</div>
                </div>
                <div class="flex-row">
                    <input type="text" id="chatInput" placeholder="输入问题..." style="flex:1; padding: 8px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: var(--text);">
                    <button class="btn btn-sm" onclick="sendChat()">发送</button>
                </div>
            </div>
        </div>

        <!-- 学习中心 -->
        <div class="page" id="page-learn">
            <div class="card">
                <h3>📺 内嵌视频</h3>
                <div class="flex-row mb-8">
                    <input type="text" id="videoIdInput" placeholder="输入 YouTube 视频 ID 或链接" style="flex:1; padding: 8px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: var(--text);">
                    <button class="btn btn-sm" onclick="loadVideo()">▶ 播放</button>
                </div>
                <div><iframe id="videoFrame" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe></div>
            </div>
            <div class="card">
                <h3>💻 代码练习（云端运行）</h3>
                <textarea id="codeEditor" class="code-area">console.log("Hello, DevSmart!");</textarea>
                <div class="flex-row mt-8">
                    <select id="langSelect" style="padding: 6px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: var(--text);">
                        <option value="javascript">JavaScript</option>
                        <option value="python3">Python 3</option>
                        <option value="java">Java</option>
                        <option value="cpp17">C++</option>
                    </select>
                    <button class="btn btn-sm" onclick="runCode()">🚀 云端运行</button>
                </div>
                <div id="codeOutput" class="output-box" style="display:none;"></div>
            </div>
        </div>

        <!-- 模拟上班 -->
        <div class="page" id="page-work">
            <div class="card">
                <h3>💼 AI 分配工作任务</h3>
                <div class="flex-row mb-8">
                    <input type="text" id="topicInput" placeholder="输入你正在学的内容，如 React" style="flex:1; padding: 8px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: var(--text);">
                    <button class="btn btn-sm" onclick="generateTasks()">🤖 生成任务</button>
                </div>
                <div id="taskResult" style="margin-top: 12px; color: var(--text);"></div>
            </div>
        </div>

        <!-- AI 考试 -->
        <div class="page" id="page-exam">
            <div class="card">
                <h3>📝 AI 出题</h3>
                <div class="flex-row mb-8">
                    <input type="text" id="examTopic" value="React 18" style="flex:1; padding: 8px; background: #0d1117; border: 1px solid var(--border); border-radius: 6px; color: var(--text);">
                    <button class="btn btn-sm" onclick="genExam()">生成考题</button>
                </div>
                <div id="examResult" style="white-space: pre-wrap; background: #0d1117; padding: 12px; border-radius: 6px; margin-top: 12px;"></div>
            </div>
        </div>

        <!-- 兼职 -->
        <div class="page" id="page-jobs">
            <div class="card">
                <h3>🌍 远程兼职（RemoteOK API）</h3>
                <button class="btn btn-sm" onclick="fetchJobs()">刷新岗位</button>
                <div id="jobList" style="margin-top: 12px;"></div>
            </div>
        </div>
    </div>
</div>

<!-- 配置面板（默认可见，方便填写） -->
<div class="config-panel" id="configPanel">
    <h4 style="margin-bottom: 12px;">🔑 API 配置</h4>
    <div class="note">密钥只保存在你的浏览器中</div>
    <label>GitHub Token * 必填</label>
    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxx">
    <label>JDoodle Client ID（选填）</label>
    <input type="text" id="jdoodleId" placeholder="你的 JDoodle ID">
    <label>JDoodle Client Secret（选填）</label>
    <input type="password" id="jdoodleSecret" placeholder="你的 JDoodle Secret">
    <button class="btn" onclick="saveConfig()" style="width:100%;">💾 保存配置</button>
    <div style="margin-top: 8px; font-size: 10px; color: var(--muted);">
        <a href="https://github.com/settings/tokens" target="_blank" style="color: var(--blue);">获取 GitHub Token</a> ·
        <a href="https://www.jdoodle.com/compiler-api/" target="_blank" style="color: var(--blue);">获取 JDoodle 密钥</a>
    </div>
</div>

<div id="toastContainer"></div>

<script>
    // ========== 全局状态 ==========
    const CONFIG_KEY = 'devsmart_config';
    let config = { githubToken: '', jdoodleId: '', jdoodleSecret: '' };

    // ========== 初始化配置 ==========
    function loadConfig() {
        const saved = localStorage.getItem(CONFIG_KEY);
        if (saved) {
            config = JSON.parse(saved);
        }
        document.getElementById('ghToken').value = config.githubToken || '';
        document.getElementById('jdoodleId').value = config.jdoodleId || '';
        document.getElementById('jdoodleSecret').value = config.jdoodleSecret || '';
    }

    function saveConfig() {
        config.githubToken = document.getElementById('ghToken').value.trim();
        config.jdoodleId = document.getElementById('jdoodleId').value.trim();
        config.jdoodleSecret = document.getElementById('jdoodleSecret').value.trim();
        localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
        showToast('配置已保存 ✅', 'success');
    }

    // ========== Toast ==========
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.textContent = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ========== 页面导航 ==========
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const targetPage = document.getElementById(`page-${item.dataset.page}`);
            if (targetPage) targetPage.classList.add('active');
        });
    });

    // ========== 配置面板切换 ==========
    const configPanel = document.getElementById('configPanel');
    let panelVisible = true; // 默认可见
    document.getElementById('toggleConfig').addEventListener('click', () => {
        panelVisible = !panelVisible;
        if (panelVisible) configPanel.classList.remove('hidden');
        else configPanel.classList.add('hidden');
    });

    // ========== AI 调用（修正后的 API 地址） ==========
    async function callAI(messages) {
        if (!config.githubToken) {
            showToast('请先在配置面板里保存 GitHub Token', 'error');
            return null;
        }
        try {
            const response = await fetch('https://models.github.ai/inference/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${config.githubToken}`
                },
                body: JSON.stringify({
                    model: 'gpt-4o',
                    messages: messages,
                    max_tokens: 600
                })
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }
            const data = await response.json();
            return data.choices?.[0]?.message?.content || '（AI 返回内容为空）';
        } catch (err) {
            console.error('AI 调用失败:', err);
            showToast('AI 请求失败，请检查 Token 或网络', 'error');
            return null;
        }
    }

    // ========== 仪表盘对话 ==========
    async function sendChat() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="chat-msg user">${escapeHtml(msg)}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;
        const reply = await callAI([{ role: 'user', content: msg }]);
        if (reply) {
            chatBox.innerHTML += `<div class="chat-msg ai">${escapeHtml(reply)}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
    document.getElementById('chatInput')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') sendChat();
    });

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ========== 视频播放 ==========
    function loadVideo() {
        let val = document.getElementById('videoIdInput').value.trim();
        let videoId = val;
        const match = val.match(/(?:youtu\.be\/|watch\?v=|\/embed\/)([^&?/]+)/);
        if (match) videoId = match[1];
        document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${videoId}`;
        showToast('视频已加载 🎬', 'success');
    }

    // ========== 云端运行（JDoodle） ==========
    async function runCode() {
        const code = document.getElementById('codeEditor').value.trim();
        if (!code) { showToast('请先输入代码', 'error'); return; }
        const lang = document.getElementById('langSelect').value;
        const outputDiv = document.getElementById('codeOutput');
        outputDiv.style.display = 'block';
        outputDiv.textContent = '⏳ 云端编译中...';
        if (!config.jdoodleId || !config.jdoodleSecret) {
            outputDiv.textContent = '❌ 需要配置 JDoodle 密钥才能云端运行。';
            showToast('请先配置 JDoodle 密钥', 'error');
            return;
        }
        try {
            const res = await fetch('https://api.jdoodle.com/v1/execute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    clientId: config.jdoodleId,
                    clientSecret: config.jdoodleSecret,
                    script: code,
                    language: lang,
                    versionIndex: '0'
                })
            });
            const data = await res.json();
            outputDiv.textContent = data.output || data.error || '（无输出）';
            if (data.error) outputDiv.style.color = '#ef4444';
            else outputDiv.style.color = '#34d399';
        } catch (e) {
            outputDiv.textContent = '网络错误：' + e.message;
            outputDiv.style.color = '#ef4444';
        }
    }

    // ========== 工作任务生成 ==========
    async function generateTasks() {
        const topic = document.getElementById('topicInput').value.trim();
        if (!topic) { showToast('请输入学习主题', 'error'); return; }
        document.getElementById('taskResult').innerHTML = '⏳ AI 正在思考...';
        const reply = await callAI([{
            role: 'user',
            content: `基于学习主题"${topic}"，为开发者安排4项今日工作任务。要求：结合该主题实际工作场景，难度递进。请用 JSON 数组格式输出，如 ["任务1","任务2","任务3","任务4"]。只输出 JSON 数组，不要其他解释。`
        }]);
        if (!reply) {
            document.getElementById('taskResult').innerHTML = '❌ 生成失败，请确认 Token 有效';
            return;
        }
        try {
            const jsonStr = reply.replace(/```json|```/g, '').trim();
            const tasks = JSON.parse(jsonStr);
            document.getElementById('taskResult').innerHTML = tasks.map(t => `<div style="padding:8px;border-bottom:1px solid var(--border);">🔹 ${escapeHtml(t)}</div>`).join('');
        } catch (e) {
            document.getElementById('taskResult').innerHTML = `⚠️ AI 返回格式异常，原始回复：<pre style="white-space:pre-wrap;">${escapeHtml(reply)}</pre>`;
        }
    }

    // ========== AI 出题 ==========
    async function genExam() {
        const topic = document.getElementById('examTopic').value.trim();
        document.getElementById('examResult').textContent = '⏳ 生成中...';
        const reply = await callAI([{
            role: 'user',
            content: `生成关于"${topic}"的3道单选题，JSON 数组格式：[{"question":"题目","options":["A","B","C","D"],"answer":0}]。只输出 JSON。`
        }]);
        if (!reply) {
            document.getElementById('examResult').textContent = '生成失败';
            return;
        }
        document.getElementById('examResult').textContent = reply;
    }

    // ========== 兼职 ==========
    async function fetchJobs() {
        const list = document.getElementById('jobList');
        list.innerHTML = '⏳ 获取中...';
        try {
            const res = await fetch('https://remotejobs.org/api/v1/jobs?category=programming&limit=5');
            const data = await res.json();
            if (!data.data?.length) { list.innerHTML = '暂无岗位'; return; }
            list.innerHTML = data.data.map(j => `
                <div style="padding:10px;border-bottom:1px solid var(--border);">
                    <strong>${escapeHtml(j.title)}</strong>
                    <span style="color:var(--muted);"> @ ${escapeHtml(j.company?.name || '')}</span>
                    <a href="${j.url}" target="_blank" style="color:var(--blue); margin-left:8px;">申请</a>
                </div>`).join('');
        } catch (e) {
            list.innerHTML = '获取失败，请检查网络';
        }
    }

    // ========== 启动 ==========
    window.addEventListener('DOMContentLoaded', () => {
        loadConfig();
        // 默认配置面板显示
        configPanel.classList.remove('hidden');
        panelVisible = true;
    });
</script>
</body>
</html>
