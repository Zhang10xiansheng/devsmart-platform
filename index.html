<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevSmart v3.0 · 职业化学习平台</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0b0f17;
      --card: #151b26;
      --border: #253349;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 12px;
      --green: #10b981;
      --orange: #f59e0b;
      --purple: #8b5cf6;
      --sidebar-width: 270px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, sans-serif; height:100vh; display:flex; }
    .hidden { display:none !important; }

    /* 侧边栏 */
    .sidebar {
      width: var(--sidebar-width); background: #0f1520; border-right:1px solid var(--border);
      display:flex; flex-direction:column; padding:24px 16px; flex-shrink:0;
    }
    .user-section { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
    .user-avatar { width:48px; height:48px; border-radius:50%; background:var(--blue); }
    .user-info { flex:1; min-width:0; }
    .user-info .name { font-weight:600; font-size:16px; }
    .user-info .status { font-size:12px; color:var(--muted); }
    .login-btn { width:100%; padding:10px; background:var(--card); border:1px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer; }
    .nav-item {
      display:flex; align-items:center; gap:12px; padding:12px 16px; margin:4px 0;
      border-radius:8px; cursor:pointer; color:var(--muted); text-decoration:none; font-size:15px;
    }
    .nav-item i { width:20px; font-size:16px; }
    .nav-item:hover, .nav-item.active { background:#1e293b; color:#fff; }

    /* 主界面 */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar {
      padding:12px 24px; background:#0f1520; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:16px;
    }
    .mode-switch { display:flex; background:var(--card); border-radius:30px; padding:4px; }
    .mode-btn {
      padding:8px 24px; border-radius:26px; cursor:pointer; font-size:14px;
      border:none; background:transparent; color:var(--muted);
    }
    .mode-btn.active { background:var(--blue); color:#fff; }
    .btn {
      background:var(--blue); color:#fff; border:none; padding:8px 20px;
      border-radius:8px; cursor:pointer; font-size:14px; display:inline-flex; align-items:center; gap:6px;
    }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
    .btn-sm { padding:6px 14px; font-size:13px; }
    .content-scroll { flex:1; overflow-y:auto; padding:24px; }
    .page { display:none; }
    .page.active { display:block; }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      padding:24px; margin-bottom:20px;
    }
    .toast {
      position:fixed; top:24px; right:24px; background:var(--blue);
      color:#fff; padding:14px 24px; border-radius:10px; z-index:9999;
    }
    .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
    .progress-bar { height:10px; background:var(--border); border-radius:8px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:8px; background:var(--blue); }
    .role-selector { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .role-btn { padding:8px 18px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; }
    .role-btn.active { background:var(--blue); border-color:var(--blue); }
    .level-selector { display:flex; gap:8px; margin-bottom:16px; }
    .level-btn { padding:6px 16px; border-radius:6px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text); }
    .level-btn.active { background:var(--purple); border-color:var(--purple); }
    .exam-question { margin-bottom:20px; }
    .exam-option {
      display:block; padding:10px 16px; margin:6px 0; border-radius:8px;
      cursor:pointer; border:1px solid var(--border); background:transparent;
    }
    .exam-option.selected { border-color:var(--blue); background:rgba(59,130,246,0.1); }
    .task-step {
      padding:12px 16px; border-left:3px solid var(--blue); background:#1e293b;
      margin:8px 0; border-radius:6px; display:flex; align-items:center; gap:12px;
    }
    .forum-post { padding:12px; border-bottom:1px solid var(--border); }
  </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
  <div class="user-section" id="userSection">
    <img class="user-avatar" id="userAvatar" src="https://via.placeholder.com/48" alt="">
    <div class="user-info">
      <div class="name" id="userName">未登录</div>
      <div class="status" id="userStatus">请设置 Token</div>
    </div>
  </div>
  <button class="login-btn" id="loginBtn"><i class="fa-brands fa-github"></i> 使用 GitHub Token 登录</button>
  <nav style="margin-top: 24px; flex:1;">
    <a class="nav-item active" data-page="dashboard"><i class="fa-solid fa-chart-pie"></i> 仪表盘</a>
    <a class="nav-item" data-page="learn"><i class="fa-solid fa-graduation-cap"></i> 学习中心</a>
    <a class="nav-item" data-page="work"><i class="fa-solid fa-briefcase"></i> 模拟上班</a>
    <a class="nav-item" data-page="exam"><i class="fa-solid fa-file-circle-check"></i> AI 考试</a>
    <a class="nav-item" data-page="practice"><i class="fa-solid fa-laptop-code"></i> 项目实操</a>
    <a class="nav-item" data-page="forum"><i class="fa-solid fa-comments"></i> 论坛</a>
    <a class="nav-item" data-page="tools"><i class="fa-solid fa-toolbox"></i> 工具箱</a>
  </nav>
  <div style="font-size:12px; color:var(--muted);">v3.0 · 职业分级平台</div>
</aside>

<!-- 主区域 -->
<div class="main">
  <header class="topbar">
    <div class="mode-switch" id="modeSwitch">
      <button class="mode-btn active" data-mode="learn">🎓 学习模式</button>
      <button class="mode-btn" data-mode="work">💼 上班模式</button>
    </div>
    <div id="currentModeLabel" style="color:var(--muted);">当前：学习模式</div>
    <div style="margin-left:auto; display:flex; gap:12px;">
      <button class="btn btn-outline btn-sm" id="configBtn"><i class="fa-solid fa-gear"></i> 设置</button>
    </div>
  </header>

  <div class="content-scroll">
    <!-- 仪表盘 -->
    <div class="page active" id="page-dashboard">
      <h2>📊 仪表盘</h2>
      <div class="card">
        <h3>📈 学习路线图 · <span id="dashboardRoleLabel">全栈开发</span> (<span id="dashboardLevelLabel">初级</span>)</h3>
        <div id="roadmapContainer"></div>
      </div>
      <div class="grid-2">
        <div class="card">
          <h4>⏳ 本周学习</h4>
          <div style="font-size:28px; font-weight:bold;">8.5h</div>
          <div>完成项目：3 个</div>
        </div>
        <div class="card">
          <h4>🤖 AI 老师</h4>
          <textarea id="aiTeacherCode" style="width:100%; height:100px; background:#0b1119; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:monospace;" placeholder="粘贴代码让 AI 分析错误..."></textarea>
          <button class="btn btn-sm" onclick="analyzeCode()" style="margin-top:8px;">🔍 分析</button>
          <div id="aiTeacherOutput" style="margin-top:8px; padding:12px; background:#0b1119; border-radius:8px; white-space:pre-wrap; max-height:200px; overflow-y:auto;"></div>
        </div>
      </div>
    </div>

    <!-- 学习中心 -->
    <div class="page" id="page-learn">
      <h2>🎓 学习中心</h2>
      <div class="grid-2">
        <div class="card">
          <h4>📺 课程视频</h4>
          <div class="flex-row" style="margin-bottom:12px;">
            <input type="text" id="videoSearchInput" placeholder="搜索关键词" style="flex:1; padding:8px; background:#0b1119; border:1px solid var(--border); border-radius:6px; color:var(--text);">
            <button class="btn btn-sm" onclick="searchCourse()">搜索</button>
          </div>
          <div id="courseList" style="max-height:200px; overflow-y:auto;"></div>
          <iframe id="videoPlayer" style="height:280px; margin-top:12px;" src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>
        <div class="card">
          <h4>💻 跟随练习</h4>
          <textarea id="learnCodeEditor" style="width:100%; height:220px; background:#0b1119; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:12px; font-family:monospace;">// 在这里编写练习代码</textarea>
          <div class="flex-row" style="margin-top:8px;">
            <select id="learnLangSelect" style="padding:6px; background:#0b1119; border:1px solid var(--border); border-radius:6px; color:var(--text);">
              <option value="javascript">JavaScript</option>
              <option value="python3">Python 3</option>
            </select>
            <button class="btn btn-sm" onclick="runLearnCode()">🚀 运行</button>
          </div>
          <div id="learnCodeOutput" style="margin-top:8px; padding:12px; background:#0b1119; border-radius:8px; font-family:monospace; white-space:pre-wrap;"></div>
        </div>
      </div>
    </div>

    <!-- 模拟上班 -->
    <div class="page" id="page-work">
      <h2>💼 模拟上班</h2>
      <div class="role-selector" id="roleSelector">
        <button class="role-btn active" data-role="sdet">测试开发</button>
        <button class="role-btn" data-role="qa">测试工程师</button>
        <button class="role-btn" data-role="fullstack">全栈开发</button>
        <button class="role-btn" data-role="ai-test">AI测试</button>
      </div>
      <div class="level-selector" id="workLevelSelector">
        <button class="level-btn active" data-level="junior">初级</button>
        <button class="level-btn" data-level="middle">中级</button>
        <button class="level-btn" data-level="senior">高级</button>
      </div>
      <div class="card">
        <h4 id="workTaskTitle">今日任务 · 测试开发 (初级)</h4>
        <div id="workTaskList"></div>
        <button class="btn btn-sm" onclick="generateWorkTasks()">🔄 重新生成</button>
      </div>
    </div>

    <!-- AI 考试 -->
    <div class="page" id="page-exam">
      <h2>📝 AI 考试</h2>
      <div class="card">
        <div class="flex-row" style="margin-bottom:16px;">
          <span style="font-weight:600;">当前职业：<span id="examRoleLabel">测试开发</span> · 等级：<span id="examLevelLabel">初级</span></span>
          <button class="btn btn-sm" onclick="startExam()">🎲 生成试卷</button>
        </div>
        <div id="examPaper"></div>
        <div id="examScore" style="margin-top:16px; font-weight:bold;"></div>
      </div>
    </div>

    <!-- 项目实操 -->
    <div class="page" id="page-practice">
      <h2>🛠 项目实操</h2>
      <div class="card">
        <div class="flex-row" style="margin-bottom:16px;">
          <span>根据 <strong><span id="practiceRoleLabel">测试开发</span> · <span id="practiceLevelLabel">初级</span></strong> 生成项目</span>
          <button class="btn btn-sm" onclick="generatePracticeProject()">✨ 生成新项目</button>
        </div>
        <div id="projectSteps"></div>
      </div>
    </div>

    <!-- 论坛 -->
    <div class="page" id="page-forum">
      <h2>💬 开发者论坛</h2>
      <div class="card">
        <textarea id="newPost" placeholder="分享你的想法..." style="width:100%; height:80px; background:#0b1119; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:12px;"></textarea>
        <button class="btn btn-sm" onclick="addPost()" style="margin-top:8px;">发布</button>
      </div>
      <div id="forumPosts" style="margin-top:16px;"></div>
    </div>

    <!-- 工具箱 -->
    <div class="page" id="page-tools">
      <h2>👑 小公举工具箱</h2>
      <div class="flex-row" style="margin-bottom:16px;">
        <button class="btn btn-sm" onclick="showTool('json')">📋 JSON</button>
        <button class="btn btn-sm" onclick="showTool('color')">🎨 颜色</button>
        <button class="btn btn-sm" onclick="showTool('timestamp')">⏱ 时间戳</button>
      </div>
      <div id="toolArea"></div>
    </div>
  </div>
</div>

<!-- 设置 & 登录面板 -->
<div class="hidden" id="configPanel" style="position:fixed; top:60px; right:20px; width:320px; background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; z-index:999;">
  <span style="position:absolute; top:12px; right:16px; cursor:pointer;" onclick="document.getElementById('configPanel').classList.add('hidden')">✕</span>
  <h4>🔑 设置 & 登录</h4>
  <label>GitHub Token</label>
  <input type="password" id="ghToken" placeholder="ghp_xxx" style="width:100%; padding:8px; background:#0b1119; border:1px solid var(--border); color:var(--text); margin-bottom:12px;">
  <label>YouTube API Key</label>
  <input type="password" id="ytKey" placeholder="AIza... (可选)" style="width:100%; padding:8px; background:#0b1119; border:1px solid var(--border); color:var(--text); margin-bottom:12px;">
  <button class="btn" onclick="saveAndLogin()" style="width:100%;">💾 保存并登录</button>
</div>

<div id="toastContainer"></div>

<script>
  // ======================== 全局状态 ========================
  const state = {
    mode: 'learn',           // learn / work
    role: 'sdet',            // 职业
    level: 'junior',         // 等级
    user: null,              // GitHub 用户信息
  };

  const CONFIG_KEY = 'ds_config_v3';
  let config = { githubToken: '', youtubeKey: '' };

  // ======================== 初始化 ========================
  function loadConfig() {
    const saved = localStorage.getItem(CONFIG_KEY);
    if (saved) config = JSON.parse(saved);
    document.getElementById('ghToken').value = config.githubToken || '';
    document.getElementById('ytKey').value = config.youtubeKey || '';
    if (config.githubToken) fetchGitHubUser();
  }

  async function fetchGitHubUser() {
    if (!config.githubToken) return;
    try {
      const res = await fetch('https://api.github.com/user', {
        headers: { Authorization: `Bearer ${config.githubToken}` }
      });
      if (res.ok) {
        state.user = await res.json();
        updateUserUI();
      } else {
        state.user = null;
        updateUserUI();
      }
    } catch (e) {
      state.user = null;
      updateUserUI();
    }
  }

  function updateUserUI() {
    const avatar = document.getElementById('userAvatar');
    const name = document.getElementById('userName');
    const status = document.getElementById('userStatus');
    const loginBtn = document.getElementById('loginBtn');
    if (state.user) {
      avatar.src = state.user.avatar_url;
      name.textContent = state.user.login;
      status.textContent = '已登录';
      loginBtn.innerHTML = '<i class="fa-solid fa-right-from-bracket"></i> 切换账号';
    } else {
      avatar.src = 'https://via.placeholder.com/48';
      name.textContent = '未登录';
      status.textContent = '请设置 Token';
      loginBtn.innerHTML = '<i class="fa-brands fa-github"></i> 使用 GitHub Token 登录';
    }
  }

  document.getElementById('loginBtn').addEventListener('click', () => {
    document.getElementById('configPanel').classList.toggle('hidden');
  });

  async function saveAndLogin() {
    config.githubToken = document.getElementById('ghToken').value.trim();
    config.youtubeKey = document.getElementById('ytKey').value.trim();
    localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
    toast('配置已保存');
    await fetchGitHubUser();
    document.getElementById('configPanel').classList.add('hidden');
  }

  document.getElementById('configBtn').addEventListener('click', () => {
    document.getElementById('configPanel').classList.toggle('hidden');
  });

  // ======================== 模式 / 职业 / 等级切换 ========================
  document.getElementById('modeSwitch').addEventListener('click', (e) => {
    const btn = e.target.closest('.mode-btn');
    if (!btn) return;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    document.getElementById('currentModeLabel').textContent = `当前：${state.mode==='work'?'上班模式':'学习模式'}`;
    updateDashboardInfo();
  });

  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      state.role = this.dataset.role;
      updateDashboardInfo();
      updateWorkTaskTitle();
      updateExamLabels();
      updatePracticeLabels();
    });
  });

  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      state.level = this.dataset.level;
      updateDashboardInfo();
      updateWorkTaskTitle();
      updateExamLabels();
      updatePracticeLabels();
    });
  });

  function updateDashboardInfo() {
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const levelMap = { junior:'初级', middle:'中级', senior:'高级' };
    document.getElementById('dashboardRoleLabel').textContent = roleMap[state.role];
    document.getElementById('dashboardLevelLabel').textContent = levelMap[state.level];
    generateRoadmap();
  }

  function updateWorkTaskTitle() {
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const levelMap = { junior:'初级', middle:'中级', senior:'高级' };
    document.getElementById('workTaskTitle').textContent = `今日任务 · ${roleMap[state.role]} (${levelMap[state.level]})`;
  }

  function updateExamLabels() {
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const levelMap = { junior:'初级', middle:'中级', senior:'高级' };
    document.getElementById('examRoleLabel').textContent = roleMap[state.role];
    document.getElementById('examLevelLabel').textContent = levelMap[state.level];
  }

  function updatePracticeLabels() {
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const levelMap = { junior:'初级', middle:'中级', senior:'高级' };
    document.getElementById('practiceRoleLabel').textContent = roleMap[state.role];
    document.getElementById('practiceLevelLabel').textContent = levelMap[state.level];
  }

  // ======================== 仪表盘路线图 ========================
  function generateRoadmap() {
    const container = document.getElementById('roadmapContainer');
    const roleMap = {
      sdet: ['自动化测试基础', 'CI/CD 集成', '性能测试'],
      qa: ['测试用例设计', '缺陷管理', '回归测试'],
      fullstack: ['前端基础', '后端 API', '数据库设计'],
      'ai-test': ['AI 模型评估', '测试数据生成', '自动化测试框架']
    };
    const levels = ['junior', 'middle', 'senior'];
    const currentIdx = levels.indexOf(state.level);
    const steps = roleMap[state.role];
    let html = '<div style="display:flex; gap:12px; flex-wrap:wrap;">';
    steps.forEach((step, idx) => {
      const isDone = idx <= currentIdx;
      html += `<div style="padding:12px 20px; background:${isDone?'var(--blue)':'#1e293b'}; border-radius:8px; color:white;">${step}</div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }

  // ======================== AI 老师 ========================
  async function analyzeCode() {
    const code = document.getElementById('aiTeacherCode').value.trim();
    if (!code) return toast('请粘贴代码');
    if (!config.githubToken) return toast('请先配置 GitHub Token');
    const out = document.getElementById('aiTeacherOutput');
    out.textContent = 'AI 分析中...';
    try {
      const res = await fetch('https://models.github.ai/inference/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.githubToken}` },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [{ role: 'user', content: `作为编程导师，请分析以下代码的错误和优化建议，用中文友好回复：\n${code}` }],
          max_tokens: 500
        })
      });
      const data = await res.json();
      out.textContent = data.choices?.[0]?.message?.content || '分析失败';
    } catch (e) {
      out.textContent = '网络错误';
    }
  }

  // ======================== 视频搜索 ========================
  async function searchCourse() {
    if (!config.youtubeKey) return toast('请先配置 YouTube API Key');
    const query = document.getElementById('videoSearchInput').value.trim();
    if (!query) return;
    const list = document.getElementById('courseList');
    list.innerHTML = '搜索中...';
    try {
      const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=5&q=${encodeURIComponent(query)}+programming&type=video&key=${config.youtubeKey}`);
      const data = await res.json();
      list.innerHTML = data.items?.map(v => `<div style="padding:6px; cursor:pointer;" onclick="document.getElementById('videoPlayer').src='https://www.youtube.com/embed/${v.id.videoId}'">${v.snippet.title}</div>`).join('') || '无结果';
    } catch (e) { list.innerHTML = '搜索失败'; }
  }

  // ======================== 学习代码运行 ========================
  function runLearnCode() {
    const code = document.getElementById('learnCodeEditor').value;
    const out = document.getElementById('learnCodeOutput');
    out.textContent = `[前端模拟运行]\n${code}`;
  }

  // ======================== 上班任务生成 ========================
  async function generateWorkTasks() {
    if (!config.githubToken) return toast('请先配置 GitHub Token');
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const roleName = roleMap[state.role];
    const levelMap = { junior:'初级', middle:'中级', senior:'高级' };
    const levelName = levelMap[state.level];
    document.getElementById('workTaskList').innerHTML = 'AI 生成中...';
    try {
      const res = await fetch('https://models.github.ai/inference/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.githubToken}` },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [{ role: 'user', content: `你是一名${roleName}（${levelName}）的技术主管，请为今天安排4项具体工作，用JSON数组：[{"title":"任务标题","desc":"详细描述"}]` }],
          max_tokens: 600
        })
      });
      const data = await res.json();
      const tasks = JSON.parse(data.choices[0].message.content.replace(/```json|```/g, '').trim());
      document.getElementById('workTaskList').innerHTML = tasks.map(t => `<div class="task-step"><strong>${t.title}</strong><p>${t.desc}</p></div>`).join('');
    } catch (e) { document.getElementById('workTaskList').innerHTML = '生成失败，请重试'; }
  }

  // ======================== AI 考试 ========================
  async function startExam() {
    if (!config.githubToken) return toast('请先配置 GitHub Token');
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const topic = `${roleMap[state.role]} (${state.level})`;
    document.getElementById('examPaper').innerHTML = '生成试卷中...';
    try {
      const res = await fetch('https://models.github.ai/inference/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.githubToken}` },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [{ role: 'user', content: `生成关于“${topic}”的3道单选题，JSON：[{"q":"题目","options":["A","B","C","D"],"answer":0}]` }],
          max_tokens: 600
        })
      });
      const data = await res.json();
      const questions = JSON.parse(data.choices[0].message.content.replace(/```json|```/g, '').trim());
      window.currentExam = questions;
      let html = '';
      questions.forEach((q, i) => {
        html += `<div class="exam-question"><strong>${i+1}. ${q.q}</strong>`;
        q.options.forEach((opt, oi) => {
          html += `<div class="exam-option" data-q="${i}" data-o="${oi}" onclick="selectOption(this)">${String.fromCharCode(65+oi)}. ${opt}</div>`;
        });
        html += `</div>`;
      });
      html += '<button class="btn btn-sm" onclick="submitExam()">提交答卷</button>';
      document.getElementById('examPaper').innerHTML = html;
    } catch (e) { document.getElementById('examPaper').innerHTML = '生成失败'; }
  }
  function selectOption(el) {
    el.parentElement.querySelectorAll('.exam-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
  }
  function submitExam() {
    let score = 0;
    document.querySelectorAll('.exam-question').forEach((q, i) => {
      const sel = q.querySelector('.exam-option.selected');
      if (sel && parseInt(sel.dataset.o) === window.currentExam[i].answer) score++;
    });
    document.getElementById('examScore').textContent = `得分：${score}/${window.currentExam.length}`;
  }

  // ======================== 项目实操 ========================
  async function generatePracticeProject() {
    if (!config.githubToken) return toast('请先配置 GitHub Token');
    const roleMap = { sdet:'测试开发', qa:'测试工程师', fullstack:'全栈开发', 'ai-test':'AI测试' };
    const topic = `${roleMap[state.role]} (${state.level})`;
    document.getElementById('projectSteps').innerHTML = 'AI 生成项目中...';
    try {
      const res = await fetch('https://models.github.ai/inference/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.githubToken}` },
        body: JSON.stringify({
          model: 'gpt-4o',
          messages: [{ role: 'user', content: `为“${topic}”设计一个跟随式实操项目，包含5个步骤，JSON数组：[{"step":1,"title":"步骤标题","desc":"步骤描述"}]` }],
          max_tokens: 600
        })
      });
      const data = await res.json();
      const steps = JSON.parse(data.choices[0].message.content.replace(/```json|```/g, '').trim());
      document.getElementById('projectSteps').innerHTML = steps.map(s => `<div class="task-step"><strong>${s.step}. ${s.title}</strong><p>${s.desc}</p></div>`).join('');
    } catch (e) { document.getElementById('projectSteps').innerHTML = '生成失败'; }
  }

  // ======================== 论坛 ========================
  function addPost() {
    const text = document.getElementById('newPost').value.trim();
    if (!text) return;
    const posts = JSON.parse(localStorage.getItem('forum_posts') || '[]');
    posts.push({ text, time: new Date().toLocaleString(), user: state.user?.login || '匿名' });
    localStorage.setItem('forum_posts', JSON.stringify(posts));
    document.getElementById('newPost').value = '';
    renderForum();
  }
  function renderForum() {
    const posts = JSON.parse(localStorage.getItem('forum_posts') || '[]');
    document.getElementById('forumPosts').innerHTML = posts.map(p => `<div class="forum-post"><strong>${p.user}</strong> · ${p.time}<p>${p.text}</p></div>`).join('');
  }

  // ======================== 工具箱 ========================
  function showTool(name) {
    const a = document.getElementById('toolArea');
    if (name === 'json') {
      a.innerHTML = `<textarea id="jsonInput" style="width:100%;height:120px;background:#0b1119;color:var(--text);border:1px solid var(--border);">{"key":"value"}</textarea>
        <button class="btn btn-sm" onclick="formatJson()">格式化</button> <button class="btn btn-sm" onclick="compressJson()">压缩</button>
        <pre id="jsonOutput" style="margin-top:8px; padding:12px; background:#0b1119;"></pre>`;
      window.formatJson = () => { try { const o = JSON.parse(document.getElementById('jsonInput').value); document.getElementById('jsonOutput').textContent = JSON.stringify(o, null, 2); } catch (e) { document.getElementById('jsonOutput').textContent = '无效 JSON'; } };
      window.compressJson = () => { try { const o = JSON.parse(document.getElementById('jsonInput').value); document.getElementById('jsonOutput').textContent = JSON.stringify(o); } catch (e) { document.getElementById('jsonOutput').textContent = '无效 JSON'; } };
    } else if (name === 'color') {
      a.innerHTML = `<input type="text" id="hexInput" placeholder="#3b82f6"><button onclick="convertColor()">转换</button><input type="text" id="rgbOutput" readonly>`;
      window.convertColor = () => { const h = document.getElementById('hexInput').value; const m = /^#?([a-f\d]{6})$/i.exec(h); if(m) { const r = parseInt(m[1].substr(0,2),16); const g = parseInt(m[1].substr(2,2),16); const b = parseInt(m[1].substr(4,2),16); document.getElementById('rgbOutput').value = `rgb(${r},${g},${b})`; } };
    } else if (name === 'timestamp') {
      a.innerHTML = `<input type="text" id="tsInput" placeholder="时间戳"><button onclick="convertTimestamp()">转换</button><input type="text" id="dateOutput" readonly>`;
      window.convertTimestamp = () => { const ts = parseInt(document.getElementById('tsInput').value); if(!isNaN(ts)) document.getElementById('dateOutput').value = new Date(ts*1000).toLocaleString(); };
    }
  }

  // ======================== 通用 ========================
  function toast(msg) {
    const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // 页面导航
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', (e) => {
      e.preventDefault();
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + item.dataset.page).classList.add('active');
    });
  });

  // 启动
  window.addEventListener('DOMContentLoaded', () => {
    loadConfig();
    updateDashboardInfo();
    updateWorkTaskTitle();
    updateExamLabels();
    updatePracticeLabels();
    renderForum();
  });
</script>
</body>
</html>
